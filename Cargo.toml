[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace]
resolver = "3"
members = [
    "app",
    "crates/pd-telemetry",
    "crates/pd-activitypub",
    "crates/pd-jsonld",
]

[workspace.dependencies]
# Local dependencies
pd-telemetry = { path = "crates/pd-telemetry" }
pd-activitypub = { path = "crates/pd-activitypub" }
pd-jsonld = { path = "crates/pd-jsonld" }

tokio = { version = "1.0", features = ["full"] }
axum = { version = "0.8.9" }
eyre = { version = "0.6" }
serde = { version = "1.0", features = ["derive"] }
serde_with = { version = "3" }
sonic-rs = { version = "0.5" }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = { version = "1.11", features = ["serde"] }
time = { version = "0.3", features = ["formatting", "parsing", "serde"] }
strum = { version = "0.28", features = ["derive"] }

# Dev dependencies
serde_test = { version = "1.0" }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
correctness = { level = "deny" }

[workspace.lints.rust]
unsafe_code = { level = "deny" }
rust-2018-idioms = { level = "deny", priority = -1 }
unexpected_cfgs = { level = "warn" }
